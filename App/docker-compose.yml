version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/marsdb
      - SPRING_DATASOURCE_USERNAME=mars
      - SPRING_DATASOURCE_PASSWORD=marspass
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      - postgres
      - elasticsearch
    networks:
      - mars-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mars-network

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5422:5432"
    environment:
      - POSTGRES_USER=mars
      - POSTGRES_PASSWORD=marspass
      - POSTGRES_DB=marsdb
    networks:
      - mars-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - mars-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - mars-network

networks:
  mars-network:
    driver: bridge